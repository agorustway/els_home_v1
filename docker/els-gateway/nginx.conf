server {
    listen 2929;
    server_name localhost;

    # 업로드 제한 증가 (20MB)
    client_max_body_size 20M;

    # 1. 아산 배차판 및 로그, 관제 관련 (els-core:2930)
    location ~ ^/api/(logs|debug|vehicle-tracking|branches|off-days) {
        proxy_pass http://127.0.0.1:2930;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. ELS 컨테이너 봇 관련 (els-bot:2931)
    location /api/els {
        proxy_pass http://127.0.0.1:2931;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. 기타 기본 요청 (els-core:2930)
    location / {
        proxy_pass http://127.0.0.1:2930;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
