version: '3.8'

services:
  # 1. Nginx Gateway (Port 2929 - Entry point)
  els-gateway:
    build:
      context: ..
      dockerfile: docker/els-gateway/Dockerfile.gateway
    container_name: els-gateway
    network_mode: host
    restart: unless-stopped
    depends_on:
      - els-bot
      - els-core

  # 2. ELS Bot Backend (Port 2931 - Heavy)
  els-bot:
    build:
      context: ..
      dockerfile: docker/els-backend/Dockerfile.bot
    container_name: els-bot
    network_mode: host
    extra_hosts:
      - "pzfnrnscwudifgcctzke.supabase.co:172.64.149.246"
      - "k-skill-proxy.nomadamas.org:172.67.129.146"
      - "elssolution.synology.me:192.168.0.4"
    env_file:
      - .env
    environment:
      - PORT=2931
      - DAEMON_URL=http://127.0.0.1:31999
      - ELS_MAX_DRIVERS=3
      - ELS_BATCH_MAX_WORKERS=3
      - ELS_DRIVER_STAGGER_SEC=15
      - ELS_DRIVER_STAGGER_SEQUENCE=0,45,120
      - ELS_LATE_WORKER_MIN_READY=2
      - ELS_LATE_WORKER_SPACING_SEC=45
      - ELS_LATE_WORKER_READY_TIMEOUT_SEC=420
      - ELS_BATCH_READY_WAIT_SEC=90
      - ELS_BATCH_MENU_MAX_ATTEMPTS=4
      - ELS_BATCH_FORCE_MENU_REOPEN=false
      - ELS_VERIFY_SUCCESS_ROWS=false
    shm_size: 2gb
    volumes:
      - /volume2/아산지점:/app/data/아산지점
      - /volume1:/app/volume1
      - /volume2:/app/volume2
      - ../elsbot:/app/elsbot
      - ./els-backend/app_bot.py:/app/app.py
      - ./els-backend/dns_fix.py:/app/dns_fix.py
    restart: unless-stopped

  # 3. Light API Core (Port 2930 - Lightweight)
  els-core:
    build:
      context: ..
      dockerfile: docker/els-backend/Dockerfile.core
    container_name: els-core
    network_mode: host
    extra_hosts:
      - "pzfnrnscwudifgcctzke.supabase.co:172.64.149.246"
      - "k-skill-proxy.nomadamas.org:172.67.129.146"
      - "elssolution.synology.me:192.168.0.4"
    env_file:
      - .env
    environment:
      - PORT=2930
    volumes:
      - /volume2/아산지점:/app/data/아산지점
      - /volume1:/app/volume1
      - /volume2:/app/volume2
      - ./els-backend/app_core.py:/app/app.py
      - ./els-backend/dns_fix.py:/app/dns_fix.py
      - ./els-backend/nas_vectorizer.py:/app/nas_vectorizer.py
      - ./els-backend/web_vectorizer.py:/app/web_vectorizer.py
    restart: unless-stopped
