version: '3.8'

services:
  els-backend:
    image: els-backend:latest
    container_name: els-backend
    # [수정] 호스트 네트워크 모드 활성화 (포트 설정은 자동으로 무시됨)
    network_mode: host
    environment:
      - PORT=2929
      - HEADLESS=1
      - CHROME_BIN=/usr/bin/google-chrome
      - CHROME_DRIVER_BIN=/usr/local/bin/chromedriver
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    # 호스트 모드에서는 ports 설정이 필요 없으므로 삭제하거나 주석 처리함
    # ports:
    #   - "2929:2929"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
