version: '3.8'

services:
  # 1. Nginx Gateway (Port 2929 - Entry point)
  els-gateway:
    build:
      context: ..
      dockerfile: docker/els-gateway/Dockerfile.gateway
    container_name: els-gateway
    network_mode: host
    restart: unless-stopped
    depends_on:
      - els-bot
      - els-core

  # 2. ELS Bot Backend (Port 2931 - Heavy)
  els-bot:
    build:
      context: ..
      dockerfile: docker/els-backend/Dockerfile.bot
    container_name: els-bot
    network_mode: host
    env_file:
      - .env
    environment:
      - PORT=2931
      - DAEMON_URL=http://127.0.0.1:31999
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # 3. Light API Core (Port 2930 - Lightweight)
  els-core:
    build:
      context: ..
      dockerfile: docker/els-backend/Dockerfile.core
    container_name: els-core
    network_mode: host
    env_file:
      - .env
    environment:
      - PORT=2930
    volumes:
      - ./data:/app/data
    restart: unless-stopped
